[mypy]
python_version = 3.12
strict = False
ignore_missing_imports = True

# Require type annotations on all function definitions
disallow_untyped_defs = True

# Warn when a function returns Any implicitly
warn_return_any = True

# Warn about unreachable code
warn_unreachable = True

# Don't require annotations on __init__ methods
disallow_untyped_decorators = False

# Third-party libraries without type stubs — suppress missing import errors
[mypy-numpy.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-manim.*]
ignore_missing_imports = True

[mypy-sympy.*]
ignore_missing_imports = True
